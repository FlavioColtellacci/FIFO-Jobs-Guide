name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack (pnpm from packageManager)
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run discovery and proposal pipeline
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: pnpm data:refresh

      - name: Commit and push refresh branch
        id: push_refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/updates.pending.json data/roles.base.json; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B chore/data-refresh
          git add data/updates.pending.json data/roles.base.json
          git commit -m "chore(data): refresh proposed source signals"
          git push --force-with-lease origin chore/data-refresh
          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: Publish manual PR link
        if: steps.push_refresh.outputs.no_changes == 'false'
        run: |
          echo "Open PR: https://github.com/${{ github.repository }}/compare/main...chore/data-refresh?expand=1" >> "$GITHUB_STEP_SUMMARY"
